<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advertisement</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .ad-card {
      max-width: 680px;
      width: 100%;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      overflow: hidden;
      text-align: center;
    }

    .ad-image {
      display: block;
      width: 100%;
      object-fit: cover;
      aspect-ratio: 16 / 9;
    }

    .ad-body {
      padding: 24px;
    }

    .ad-copy {
      margin: 0;
      color: {{TEXT_COLOR}};
      font-size: {{TEXT_SIZE}}px;
      line-height: 1.2;
      font-weight: 700;
    }

    .ad-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
      padding: 14px 24px;
      border-radius: 9999px;
      background: #1d4ed8;
      color: #ffffff;
      font-size: 16px;
      text-decoration: none;
    }

    .ad-link {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <article class="ad-card">
    <a id="ad-click-link" class="ad-link" href="{{TARGET_URL}}" target="_blank" rel="noopener noreferrer">
      <img class="ad-image" src="{{IMAGE_URL}}" alt="Advertisement image" />
      <div class="ad-body">
        <p class="ad-copy">{{AD_TEXT}}</p>
        <div class="ad-button">Learn More</div>
      </div>
    </a>
  </article>
  <script src="./scripts.js"></script>
</body>
</html>
